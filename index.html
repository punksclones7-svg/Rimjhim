u<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Envelope Story</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    font-family: Georgia, serif;
    background: #f2f2f2;
    overflow: hidden;
}

/* ENVELOPE */
.envelope {
    width: 420px;
    height: 280px;
    background: #fff8e7;
    border: 3px solid #b22222;
    border-radius: 10px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
}

.envelope::before {
    content: "";
    position: absolute;
    inset: 0;
    background: #f4e2c4;
    clip-path: polygon(0 0, 100% 0, 50% 55%);
    transform-origin: top;
    transition: 1s;
}

.envelope.open::before {
    transform: rotateX(180deg);
}

/* SEAL */
.seal {
    position: absolute;
    width: 70px;
    height: 70px;
    background: radial-gradient(circle, #ffd700, #c99700);
    border-radius: 50%;
    left: 50%;
    top: 55%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    animation: glow 1.5s infinite;
}

@keyframes glow {
    50% { box-shadow: 0 0 30px rgba(255,200,0,1); }
}

/* PAGE */
.page {
    position: absolute;
    inset: 0;
    display: none;
    padding: 40px;
    overflow-y: auto;
}

/* PAPER STYLE */
.paper-style {
    background:
      radial-gradient(circle at top left, rgba(120,70,20,0.3), transparent 40%),
      radial-gradient(circle at bottom right, rgba(120,70,20,0.3), transparent 40%),
      linear-gradient(#f6e7c1, #f1dba8);
    border-radius: 6px;
    font-size: 22px;
    white-space: pre-wrap;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 15px;
    background: #b22222;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

/* FORM */
form {
    max-width: 500px;
    margin: 20px auto;
    padding: 15px;
    background: #fff8e7;
    border-radius: 8px;
}

/* QUESTION LABEL */
label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* MESSAGE */
.msg {
    display: block;
    margin-top: 5px;
    font-size: 14px;
}

/* SHAYARI */
#shayariPage {
    text-align: center;
    font-size: 26px;
    padding-top: 100px;
}
</style>
</head>

/* AJAX SUBMIT */
document.querySelectorAll(".qForm").forEach(form => {
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = new FormData(form);
        const msg = form.querySelector(".msg");

        try {
            const res = await fetch("https://formspree.io/f/xkozaydp", {
                method: "POST",
                body: data,
                headers: { 'Accept': 'application/json' }
            });

            if (res.ok) {
                msg.innerHTML = "✅ Answer sent!";
                msg.style.color = "green";
                form.reset();
            } else {
                msg.innerHTML = "❌ Error!";
                msg.style.color = "red";
            }
        } catch {
            msg.innerHTML = "❌ Network error!";
            msg.style.color = "red";
        }
    });
});
